name: Score comment update

# Update live scores by posting a GitHub Issue comment from your phone. The
# comment must contain a /WK-SCORES ... /END-WK-SCORES block, e.g.:
#
#   /WK-SCORES
#   match_number,team_a_goals,team_b_goals,status,notes
#   1,2,1,played,Mexico v South Africa
#   /END-WK-SCORES
#
# Knockout matches (73-104) use the same 5-column form, or a 6-column form with
# an optional advanced_team naming the shoot-out winner when a tie is level:
#
#   /WK-SCORES
#   match_number,team_a_goals,team_b_goals,status,notes,advanced_team
#   73,1,1,played,R32 penalties,Canada
#   /END-WK-SCORES
#
# Guardrails: this workflow NEVER trains models, fetches APIs, or touches raw
# data. It only runs the lightweight Travel Mode scripts.

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

concurrency:
  group: travel-mode-score-comment
  cancel-in-progress: false

jobs:
  ingest:
    # Only run when the comment actually carries a score block.
    if: contains(github.event.comment.body, '/WK-SCORES')
    runs-on: ubuntu-latest
    env:
      TRAVEL_MODE_REPO: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Ensure score override exists
        run: |
          if [ ! -f data/live/scores_override.csv ]; then
            python scripts/init_scores_override.py
          fi

      - name: Prepare prediction view fallback
        run: |
          mkdir -p outputs/predictions
          if [ ! -f outputs/predictions/group_submission_view.csv ]; then
            cp outputs/final_candidate_v4_recent_rollforward/final_group_score_predictions_fill_only.csv outputs/predictions/group_submission_view.csv
          fi
          ls -lh outputs/predictions/group_submission_view.csv 

      - name: Save comment body to a temp file
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          printf '%s' "$COMMENT_BODY" > /tmp/wk_comment.txt

      - name: Apply scores from comment
        id: apply
        run: python scripts/apply_score_comment.py --comment-file /tmp/wk_comment.txt

      - name: Recompute live tournament state
        if: success()
        run: python scripts/update_live_tournament_state.py

      - name: Recalculate live simulations
        if: success()
        run: python scripts/recalculate_live_simulations.py --sims 20000

      - name: Score predictions vs actuals
        if: success()
        run: python scripts/score_predictions_vs_actuals.py

      - name: Build knockout predictions
        if: success()
        run: python scripts/build_knockout_predictions.py

      - name: Build mobile dashboard
        if: success()
        run: python scripts/build_mobile_dashboard.py

      - name: Publish to docs/ (GitHub Pages)
        if: success()
        run: |
          mkdir -p docs
          cp outputs/live/mobile_dashboard.html docs/index.html
          cp outputs/live/mobile_dashboard_data.json docs/mobile_dashboard_data.json
          cp outputs/live/live_group_tables.csv docs/live_group_tables.csv
          cp outputs/live/live_group_stage_simulation_summary.csv docs/live_group_stage_simulation_summary.csv
          cp outputs/live/prediction_vs_actual.csv docs/prediction_vs_actual.csv
          cp outputs/live/scoring_summary.csv docs/scoring_summary.csv
          cp outputs/live/played_matches.csv docs/played_matches.csv
          cp outputs/live/remaining_matches.csv docs/remaining_matches.csv
          cp outputs/live/knockout_predictions.csv docs/knockout_predictions.csv
          cp outputs/live/knockout_predictions.json docs/knockout_predictions.json

      - name: Commit generated live outputs
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live/scores_override.csv outputs/live docs outputs/reports/live_tournament_state_report.md outputs/reports/live_group_stage_simulation_report.md outputs/reports/prediction_vs_actual_report.md outputs/reports/score_comment_ingestion_report.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Travel Mode: scores from issue comment #${{ github.event.issue.number }}"
            git push
          fi

      - name: Reply to the issue with the result
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'outputs/reports/score_comment_ingestion_report.md';
            let body = 'Travel Mode processed your /WK-SCORES comment.';
            try { body = fs.readFileSync(path, 'utf8'); } catch (e) {}
            const ok = '${{ steps.apply.outcome }}' === 'success';
            const header = ok
              ? '✅ Scores applied and dashboard updated.\n\n'
              : '❌ Score update failed — nothing was applied.\n\n';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: header + body,
            });
